id: april_2026
label: April 2026
asOf: '2026-04-05'
subtitle: Editorial ranking snapshot
summary: >
  A ranked snapshot of the best AI models, coding harnesses, and subscriptions
  for this period. Each section is ordered by placement.

models:
  - id: gpt-5-4
    name: GPT 5.4
    url: https://openai.com/index/introducing-gpt-5-4/
    logoId: gpt-5-4
    tags: [default, coding, computer use]
    recommended: true
    description: |
      My default model for coding.
    pros:
      - Incredible instruction following
      - Recent training data
      - Tool calling and running for a long time in a loop
      - Coding
      - Computer & Browser Use
    cons:
      - Awful at UI

  - id: opus-4-6
    name: Opus 4.6
    url: https://www.anthropic.com/claude/opus
    logoId: opus-4-6
    tags: [ui, design, coding]
    recommended: true
    description: |
      The model I use for making UIs and doing frontend work
    pros:
      - Great at tool calling
      - Feels really fast (prone to action)
      - Pleasant to talk to
      - Excellent at UI and frontend
      - Great at planning
    cons:
      - Lacks the "wisdom" of 5.4, resulting in much worse code over time
      - Expensive

  - id: gpt-5-4-mini
    name: GPT 5.4 Mini
    url: https://platform.openai.com/docs/models/gpt-5.4-mini
    logoId: gpt-5-4-mini
    tags: [search, subagents, computer use]
    recommended: true
    description: |
      A sleeper pick. The speed is absurd, incredible for "sub agent" type tasks (search with tools)
    pros:
      - Excellent tool calling
      - Very very fast
      - Very cheap
    cons:
      - Lacks the overall intelligence of 5.4

  - id: haiku-4-5
    name: Haiku 4.5
    url: https://www.anthropic.com/claude/haiku
    logoId: haiku-4-5
    tags: [search, coding, subagents, ui]
    recommended: true
    description: |
      A sleeper pick. The speed is good, incredible for creating copy of a website
    pros:
      - Excellent tool calling
      - fast
      - cheap (but not as cheap as 5.4 mini)
      - performs well for writing code
      - similar to Sonnet 4.5
    cons:
      - Lacks the overall intelligence of 5.4

  - id: minimax-2-5
    name: MiniMax 2.5
    url: https://www.minimax.io/news/minimax-m25
    logoId: minimax-2-5
    tags: [coding]
    description: |
      Another sleeper pick I didn't think I would use as much as I do. Anytime I need a quick change/search it's perfect. Also surprisingly good at UI stuff. Similar to Opus 4.6 on coding
    pros:
      - Cheap
      - Great at tool calling
      - Pretty smart and capable
      - Open Weight
    cons:
      - Can only be used in Cursor harnesses
      - Not as powerful as the frontier from OpenAI and Anthropic

  - id: qwen-3-6-plus
    name: Qwen 3.6 Plus
    url: https://qwen.ai/blog?id=qwen3.6
    logoId: qwen-3-6-plus
    tags: [coding]
    description: |
      Model that's pretty good at tool calling and somewhat good at UI. Go-To model for small projects.
    pros:
      - Free for now
      - Good at tool calling
      - Pretty smart and capable
    cons:
      - Not good for big projects

  - id: gemini-3-1-pro
    name: Gemini 3.1 Pro (and flash kinda)
    url: https://deepmind.google/models/gemini/pro
    logoId: gemini-3-1-pro
    tags: [intelligent, google model]
    description: |
      Do you want to process a video, image, or turn a giant blob of text into JSON? This is the model (or flash) for it. It's also pretty good at UI.
    pros:
      - Probably the best multi-modal model right now (video, image, etc.)
      - Turning messy input into structured JSON
      - Pretty good at UI
    cons:
      - Awful at tool calling and working in an agent harness
      - Works great only in cursor

harnesses:
  - id: pi
    name: Pi
    url: https://github.com/badlogic/pi-mono
    logoId: pi
    tags: [cli, sdk]
    recommended: true
    description: |
      The tui is a tui. Idk what else to say but: it's good.
      No massive system prompts, so low context at the start

      The really impressive part is the SDK. Best "agent" SDK I've tried by a lot.
    pros:
      - Fast and minimal tui
      - Incredible SDK
      - Can use any model* (including opencode's models)
    cons:
      - Auth is a little weird with the tui

  - id: opencode
    name: Opencode
    url: https://opencode.ai
    logoId: opencode
    tags: [cli, desktop app, sdk]
    recommended: true
    description: |
      Still the most impressive overall tui and their desktop app has come a lot way to actually being quite solid. I use it for most of my task
    pros:
      - Looks and feels great to use
      - Has free models
      - Solid desktop app
      - Excellent client/server architecture making it super extensible
    cons:
      - SDK is pretty bad compared to pi. It just does too much
      - TUI isn't a normal TUI, it fully takes over the terminal view which is great most of the time, but can cause weird issues

  - id: t3-code
    name: T3 Code
    url: https://t3.codes/
    logoId: t3-code
    tags: [desktop app]
    recommended: true
    description: |
      Yes I'm biased, but T3 Code is really good.
    pros:
      - Very very fast
      - Doesn't lag and overheat my computer
      - Wraps codex and other existing harnesses so it's A) free and B) giving u the best experience for the models
    cons:
      - Currently only support codex and claude code, thus limited model selection

  - id: codex
    name: Codex
    url: https://openai.com/codex
    logoId: codex
    tags: [cli, desktop app, cloud agent, sdk]
    description: |
      The best harness for OpenAI models. CLI is great. Desktop app is beautiful, but has a ton of perf issues. I mostly just use it under the hood through T3 Code.
    pros:
      - Desktop app looks beautiful
      - CLI is minimal and performant
      - Excellent harness for the current best models
    cons:
      - Desktop performance is rough

  - id: cursor
    name: Cursor
    url: https://cursor.com
    logoId: cursor
    tags: [editor, cloud agent, desktop app, cli]
    description: |
      Only good AI editor.
    pros:
      - Editor is vscode based, it's what u expect it works
      - They have the only good cloud agents I've tried
      - Every model is usable
    cons:
      - General stability of the product/platform is rough...
      - Have to use a cursor sub for the inference
      - Glass the new desktop ui is very early and has a ton of issues

  - id: claude-code
    name: Claude Code
    url: https://docs.anthropic.com/en/docs/claude-code/overview
    logoId: claude-code
    tags: [cli, sdk]
    description: |
      It's in a rough state
    cons:
      - Not something I reach for

subs:
  - id: github-copilot-student
    name: GitHub Copilot Student
    url: https://education.github.com/pack
    logoId: github-copilot
    tags: [free, major model]
    recommended: true
    description: |
      Not nearly as insane of a subsidy as the major labs, but still worth having in my opinion for students.

      If you have to pick only one sub, this is the one to get.
    pros:
      - You get most models from major labs
      - Model variety
    cons:
      - No Flagship models for student plan
      - Inference subsidy isn't as crazy as the big labs'

  - id: zed-student
    name: Zed Student
    url: https://zed.dev/education
    logoId: zed
    tags: [free, major model]
    recommended: true
    description: |
      You get $10 worth of monthly usage for free and unlimited edit predictions for 1 year.
    pros:
      - You get a solid editor (only for adults)
      - Real-time multiplayer collaboration
    cons:
      - GPT models only

  - id: codex-20
    name: OpenAI Codex
    url: https://openai.com/codex/
    logoId: codex-200
    tags: [$20, gpt only]
    recommended: true
    description: |
      This is the third sub I'd get if you can spend the money. It's insane of a value than other subs, but it seems like you can pretty easily get close to ~$800-$1000 if you push it (although that could change).

      If you can afford subs, this is the other one to get. GPT models are overall the best right now, and OpenAI is super chill about letting you use the sub in other harnesses:

      Codex
      T3 Code
      Opencode
      Pi
    pros:
      - Insane value for the money
      - Harness flexibility
    cons:
      - GPT models only

  - id: claude-pro
    name: Claude Pro
    url: https://www.anthropic.com/pricing
    logoId: claude-pro
    tags: [$20, claude only]
    description: |
      A pretty insane value for the money if you push it hard. Your $20 will get you ~$400-$500 a month in inference if you push it.

      The problem is this is the most locked down sub of them all. You can really only use it in Claude Code which is currently the weakest mainline harness
    pros:
      - Huge inference value if you hammer it
    cons:
      - Locked to Claude Code
      - Using other harnesses can ban of your account
